<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vihreä tekoäly -työpaja</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<main id="content">
  <p class="loading">Ladataan…</p>
  <noscript>
    <p>Tämä sivu vaatii JavaScriptin. Sisältö on luettavissa myös
    <a href="content.md">content.md</a>-tiedostosta.</p>
  </noscript>
</main>
<script src="https://cdn.jsdelivr.net/npm/marked@13/marked.min.js"></script>
<script>
  fetch('content.md', { cache: 'no-cache' })
    .then(function (r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function (md) {
      document.getElementById('content').innerHTML = marked.parse(md);
    })
    .catch(function (err) {
      document.getElementById('content').innerHTML =
        '<p>Sisällön lataus epäonnistui: ' + err.message + '</p>';
    });
</script>
</body>
</html>
